<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720">
  <defs>
    <linearGradient id="nm-gridline" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#BFD9CF" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#BFD9CF" stop-opacity="0.15"></stop>
    </linearGradient>
  </defs>

  <!-- horizontal arcs -->
  <g stroke="url(#nm-gridline)" fill="none" stroke-width="1">
    <path d="M-100 220 Q 720 80 1540 220"></path>
    <path d="M-100 300 Q 720 150 1540 300"></path>
    <path d="M-100 380 Q 720 230 1540 380"></path>
    <path d="M-100 460 Q 720 310 1540 460"></path>
    <path d="M-100 540 Q 720 390 1540 540"></path>
  </g>

  <!-- vertical meridians -->
  <g stroke="url(#nm-gridline)" fill="none" stroke-width="1">
    <path d="M720 40 C 360 40 220 340 720 680"></path>
    <path d="M720 40 C 500 40 360 340 720 680"></path>
    <path d="M720 40 C 940 40 1080 340 720 680"></path>
    <path d="M720 40 C 1080 40 1220 340 720 680"></path>
  </g>
</svg>
